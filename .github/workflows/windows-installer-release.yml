name: Windows Installer Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sidecar/pyproject.toml

      - name: Install Node dependencies
        run: npm ci

      - name: Install sidecar package dependencies
        working-directory: sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[package]"

      - name: Build sidecar with PyInstaller
        working-directory: sidecar
        run: pyinstaller pyinstaller.spec

      - name: Build Windows installer with electron-builder
        working-directory: app
        env:
          npm_config_workspaces: "false"
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            app/release/PDF-Parser-Setup-*.exe
            app/release/latest*.yml
            app/release/*.blockmap
          if-no-files-found: error

      - name: Upload installer to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" app/release/PDF-Parser-Setup-*.exe --clobber
