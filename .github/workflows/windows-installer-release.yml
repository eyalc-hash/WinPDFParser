name: Windows Installer Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sidecar/pyproject.toml

      - name: Install Node dependencies
        run: npm ci

      - name: Install sidecar package dependencies
        working-directory: sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[package]"

      - name: Build sidecar with PyInstaller
        working-directory: sidecar
        run: pyinstaller pyinstaller.spec

      # electron-builder runs an internal `npm install --omit=dev` inside `app/`
      # before packaging. Because `app/` is an npm workspace member, that install
      # would otherwise be evaluated against the whole workspace and prune all
      # devDependencies (including electron-builder's own `7zip-bin`) from the
      # hoisted root `node_modules`, causing the build to fail with
      # `ENOENT chmod node_modules/7zip-bin/win/x64/7za.exe`.
      #
      # The previous workaround (setting `npm_config_workspaces=false`) no longer
      # works: npm >= 11 refuses any command in a workspace-member CWD when that
      # env var is set, erroring with
      # `Can not use --no-workspaces and --workspace at the same time`.
      #
      # Instead, drop the `workspaces` declaration from the root `package.json`
      # before packaging. The root `node_modules` is already populated by the
      # `npm ci` above, and removing the workspace field makes the internal
      # `npm install --omit=dev` treat `app/` as a standalone package, leaving
      # the root `node_modules` (and `7zip-bin`) intact.
      - name: Detach app from npm workspace for packaging
        run: node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); delete p.workspaces; fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');"

      - name: Build Windows installer with electron-builder
        working-directory: app
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            app/release/PDF-Parser-Setup-*.exe
            app/release/latest*.yml
            app/release/*.blockmap
          if-no-files-found: error

      - name: Upload installer to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" app/release/PDF-Parser-Setup-*.exe --clobber

  bump-minor-version:
    name: Bump minor version for next release
    needs: build-windows-installer
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Bump minor version
        id: bump
        run: |
          node <<'NODE'
          const fs = require('fs');

          function readJson(path) {
            return JSON.parse(fs.readFileSync(path, 'utf8'));
          }

          function writeJson(path, data) {
            fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          }

          function nextMinor(version) {
            const match = version.match(/^(\d+)\.(\d+)\.(\d+)$/);
            if (!match) {
              throw new Error(`Unsupported version format: ${version}`);
            }

            const major = Number(match[1]);
            const minor = Number(match[2]) + 1;
            return `${major}.${minor}.0`;
          }

          const rootPackage = readJson('package.json');
          const nextVersion = nextMinor(rootPackage.version);

          rootPackage.version = nextVersion;
          writeJson('package.json', rootPackage);

          const appPackage = readJson('app/package.json');
          appPackage.version = nextVersion;
          writeJson('app/package.json', appPackage);

          const lockfile = readJson('package-lock.json');
          lockfile.version = nextVersion;
          lockfile.packages[''].version = nextVersion;
          lockfile.packages.app.version = nextVersion;
          writeJson('package-lock.json', lockfile);

          const pyprojectPath = 'sidecar/pyproject.toml';
          const pyproject = fs.readFileSync(pyprojectPath, 'utf8');
          fs.writeFileSync(
            pyprojectPath,
            pyproject.replace(/^version = "[^"]+"/m, `version = "${nextVersion}"`),
          );

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${nextVersion}\n`);
          NODE

      - name: Commit and push version bump
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json app/package.json package-lock.json sidecar/pyproject.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git push
