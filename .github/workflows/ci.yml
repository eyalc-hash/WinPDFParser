name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node:
    name: Node (Electron + React) — lint, typecheck, test
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm --workspace app run test -- tests/shared-types.test.ts
      - run: npm run test

  python:
    name: Python (sidecar) — lint, typecheck, test
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: sidecar/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy pdf_parser_sidecar
      - run: pytest -q tests/test_app.py -k openapi_includes_health_and_recovery_contract
      - run: pytest -q
